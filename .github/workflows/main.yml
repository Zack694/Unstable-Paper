name: Build Unstable Paper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Apply patches
        run: ./gradlew applyPatches

      - name: Build
        run: ./gradlew createMojmapBundlerJar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: unstable-paper
          path: paper-server/build/libs/paper-bundler-*.jar
